apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-register-browser
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      replicas: 2
    containers:
      - name: app
        image:
          repository: ghcr.io/netwerk-digitaal-erfgoed/dataset-register/apps-browser
          tag: 20260717054030-7a3fec6 # {"$imagepolicy": "nde:dataset-register-browser:tag"}
        port: 3000
        # SSR is CPU-bound (ldkit RDF parse + Svelte render + devalue-serialize of
        # the ~800 KB detail page). The SURF LimitRange default of 250m throttled
        # the render bursts ~40–70% of active CFS periods, inflating TTFB. At a 1-core
        # limit throttling dropped to ~20% and TTFB median ~1s→~0.44s; raise to 2
        # cores (as QLever uses) to give the bursts more headroom. Memory peaks
        # ~150 MiB / 256 over 7d with no OOM, so only CPU is raised.
        resources:
          requests:
            cpu: "250m"
            memory: 128Mi
          limits:
            cpu: "2"
            memory: 256Mi
        env:
          - name: PROTOCOL_HEADER
            value: "x-forwarded-proto"
          - name: HOST_HEADER
            value: "x-forwarded-host"
          # Server-side search engine config: the browser runs the Typesense
          # engine behind its /graphql endpoint and reads this internal Typesense
          # service, which is never exposed to the client. The admin key is used
          # because the engine's in-memory label cache exports the label
          # collections, which a search-only key cannot do; it stays server-side.
          - name: TYPESENSE_HOST
            value: "dataset-register-typesense"
          - name: TYPESENSE_PROTOCOL
            value: "http"
          - name: TYPESENSE_PORT
            value: "8108"
          - name: TYPESENSE_API_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-typesense
                key: api-key
          # Enables the detail-page Knowledge Graph analysis cache (see the
          # dataset-register app). The cache is opt-in: it is only active when
          # VALKEY_URL is set, so it stays bypassed anywhere this is absent.
          - name: VALKEY_URL
            value: "redis://dataset-register-valkey:6379"
    ingresses:
      - hosts:
          - datasetregister.netwerkdigitaalerfgoed.nl
        paths:
          - path: /dataset
            pathType: Prefix
          - path: /datasets
            pathType: Prefix
          - path: /changes
            pathType: Prefix
          - path: /_app
            pathType: Prefix
          - path: /en
            pathType: Prefix
          - path: /proxy
            pathType: Prefix
          # The GraphQL search API the browser queries same-origin (server-side
          # engine); the SPA's search is dead in prod without this route.
          - path: /graphql
            pathType: Prefix
          - path: /sitemap.xml
            pathType: Prefix
          - path: /robots.txt
            pathType: Prefix
          - path: /validate(/|$)(.*)
            pathType: ImplementationSpecific
