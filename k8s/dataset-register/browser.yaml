apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-register-browser
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      replicas: 2
    containers:
      - name: app
        image:
          repository: ghcr.io/netwerk-digitaal-erfgoed/dataset-register/apps-browser
          tag: 20260710183632-1451581 # {"$imagepolicy": "nde:dataset-register-browser:tag"}
        port: 3000
        # SSR is CPU-bound (ldkit RDF parse + Svelte render + devalue-serialize of
        # the ~800 KB detail page). The SURF LimitRange default of 250m throttled
        # the render bursts ~40–70% of active CFS periods, inflating TTFB. At a 1-core
        # limit throttling dropped to ~20% and TTFB median ~1s→~0.44s; raise to 2
        # cores (as QLever uses) to give the bursts more headroom. Memory peaks
        # ~150 MiB / 256 over 7d with no OOM, so only CPU is raised.
        resources:
          requests:
            cpu: "250m"
            memory: 128Mi
          limits:
            cpu: "2"
            memory: 256Mi
        env:
          - name: PROTOCOL_HEADER
            value: "x-forwarded-proto"
          - name: HOST_HEADER
            value: "x-forwarded-host"
          # Typesense search config for the browser. The #2119 browser image has no
          # SPARQL listing, so these must be present before that image deploys – the
          # browser stays pinned (see the tag above) until the index is built and
          # verified, then unpinning deploys the new image onto a ready Typesense.
          - name: PUBLIC_TYPESENSE_HOST
            value: "search.datasetregister.netwerkdigitaalerfgoed.nl"
          - name: PUBLIC_TYPESENSE_PROTOCOL
            value: "https"
          - name: PUBLIC_TYPESENSE_PORT
            value: "443"
          - name: PUBLIC_TYPESENSE_SEARCH_ONLY_API_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-typesense
                key: search-only-api-key
          # Enables the detail-page Knowledge Graph analysis cache (see the
          # dataset-register app). The cache is opt-in: it is only active when
          # VALKEY_URL is set, so it stays bypassed anywhere this is absent.
          - name: VALKEY_URL
            value: "redis://dataset-register-valkey:6379"
    ingresses:
      - hosts:
          - datasetregister.netwerkdigitaalerfgoed.nl
        paths:
          - path: /dataset
            pathType: Prefix
          - path: /datasets
            pathType: Prefix
          - path: /changes
            pathType: Prefix
          - path: /_app
            pathType: Prefix
          - path: /en
            pathType: Prefix
          - path: /proxy
            pathType: Prefix
          - path: /sitemap.xml
            pathType: Prefix
          - path: /robots.txt
            pathType: Prefix
          - path: /validate(/|$)(.*)
            pathType: ImplementationSpecific
