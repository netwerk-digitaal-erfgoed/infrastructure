apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-register-browser
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      replicas: 2
    containers:
      - name: app
        image:
          repository: ghcr.io/netwerk-digitaal-erfgoed/dataset-register/apps-browser
          # PINNED for the GraphQL search migration (dataset-register#2232): the
          # Flux image-policy auto-update marker (normally a trailing comment on the
          # tag line below) is removed so that merging #2232 does not deploy the new
          # server-side /graphql browser image before the typed Typesense collections
          # exist – that would show bare-IRI labels and empty group facets until the
          # crawler reindexes. To unpin, restore that trailing image-policy marker on
          # the tag line (the other apps in this repo show the exact syntax) once the
          # reindex has run and /graphql is verified; Flux then deploys the new image.
          tag: 20260713115504-ad1b03f
        port: 3000
        # SSR is CPU-bound (ldkit RDF parse + Svelte render + devalue-serialize of
        # the ~800 KB detail page). The SURF LimitRange default of 250m throttled
        # the render bursts ~40–70% of active CFS periods, inflating TTFB. At a 1-core
        # limit throttling dropped to ~20% and TTFB median ~1s→~0.44s; raise to 2
        # cores (as QLever uses) to give the bursts more headroom. Memory peaks
        # ~150 MiB / 256 over 7d with no OOM, so only CPU is raised.
        resources:
          requests:
            cpu: "250m"
            memory: 128Mi
          limits:
            cpu: "2"
            memory: 256Mi
        env:
          - name: PROTOCOL_HEADER
            value: "x-forwarded-proto"
          - name: HOST_HEADER
            value: "x-forwarded-host"
          # Expand phase: both the old and new browser image configs are present so
          # this env is safe under either image. The CURRENT image queries Typesense
          # directly from the client with the public search-only key (below). The
          # NEW image (GraphQL search migration) runs the Typesense engine server-side
          # and reads the private TYPESENSE_* config; the client no longer sees a key.
          # Contract (a later change) removes the PUBLIC_TYPESENSE_* block once the new
          # image is live.
          #
          # Client-direct config for the current image (public search-only key).
          - name: PUBLIC_TYPESENSE_HOST
            value: "search.datasetregister.netwerkdigitaalerfgoed.nl"
          - name: PUBLIC_TYPESENSE_PROTOCOL
            value: "https"
          - name: PUBLIC_TYPESENSE_PORT
            value: "443"
          - name: PUBLIC_TYPESENSE_SEARCH_ONLY_API_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-typesense
                key: search-only-api-key
          # Server-side engine config for the new image: the internal Typesense
          # service (never exposed to the client). The admin key is used because the
          # engine's in-memory label cache exports the label collections, which the
          # search-only key cannot do; it stays server-side.
          - name: TYPESENSE_HOST
            value: "dataset-register-typesense"
          - name: TYPESENSE_PROTOCOL
            value: "http"
          - name: TYPESENSE_PORT
            value: "8108"
          - name: TYPESENSE_API_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-typesense
                key: api-key
          # Enables the detail-page Knowledge Graph analysis cache (see the
          # dataset-register app). The cache is opt-in: it is only active when
          # VALKEY_URL is set, so it stays bypassed anywhere this is absent.
          - name: VALKEY_URL
            value: "redis://dataset-register-valkey:6379"
    ingresses:
      - hosts:
          - datasetregister.netwerkdigitaalerfgoed.nl
        paths:
          - path: /dataset
            pathType: Prefix
          - path: /datasets
            pathType: Prefix
          - path: /changes
            pathType: Prefix
          - path: /_app
            pathType: Prefix
          - path: /en
            pathType: Prefix
          - path: /proxy
            pathType: Prefix
          # The GraphQL search API the browser queries same-origin (server-side
          # engine); the SPA's search is dead in prod without this route.
          - path: /graphql
            pathType: Prefix
          - path: /sitemap.xml
            pathType: Prefix
          - path: /robots.txt
            pathType: Prefix
          - path: /validate(/|$)(.*)
            pathType: ImplementationSpecific
