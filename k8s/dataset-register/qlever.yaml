apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-register-qlever
spec:
  serviceAccountName: nde
  interval: 30m
  upgrade:
    remediation:
      remediateLastFailure: false
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      type: statefulset

    containers:
      - name: app
        image:
          repository: adfreiburg/qlever
          tag: commit-9ec88a0
        flux:
          enabled: false
        port: 7001
        env:
          - name: ACCESS_TOKEN
            valueFrom:
              secretKeyRef:
                name: dataset-register-qlever
                key: access-token
        resources:
          # requests = limits for Guaranteed QoS.
          requests:
            cpu: "2"
            memory: 12Gi
          limits:
            cpu: "2"
            memory: 12Gi
        startupProbe:
          httpGet:
            path: /?query=ASK%20%7B%7D
            port: 7001
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 60  # Allow time for indexing.
        livenessProbe:
          httpGet:
            path: /?query=ASK%20%7B%7D
            port: 7001
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
          - name: data
            mountPath: /data
          - name: config
            mountPath: /config/Qleverfile
            subPath: Qleverfile
        workingDir: /data
        command:
          - sh
          - -c
          - |
            # Trap SIGTERM so kubelet (and kill 1) can terminate PID 1 cleanly.
            trap 'echo "SIGTERM received, stopping qlever-server"; qlever stop --access-token "$ACCESS_TOKEN" 2>/dev/null || true; exit 0' TERM INT

            # Copy Qleverfile so it's not mounted in /data (avoids issues with rebuild-index moving files)
            cp /config/Qleverfile Qleverfile

            start_server() {
              qlever start --access-token "$ACCESS_TOKEN"
              qlever log &
            }

            start_server

            # Daily rebuild loop
            while true; do
              # Calculate seconds until 2:30 AM
              now=$(date +%s)
              today_target=$(date -d "today 02:30" +%s 2>/dev/null || date -v2H -v30M -v0S +%s)
              if [ $now -lt $today_target ]; then
                sleep_seconds=$((today_target - now))
              else
                tomorrow_target=$(date -d "tomorrow 02:30" +%s 2>/dev/null || date -v+1d -v2H -v30M -v0S +%s)
                sleep_seconds=$((tomorrow_target - now))
              fi

              echo "Sleeping until 2:30 AM ($sleep_seconds seconds)..."
              sleep $sleep_seconds

              echo "Starting index rebuild at $(date)"
              qlever rebuild-index --access-token "$ACCESS_TOKEN" --keep-old-index-dirs all

              # rebuild-index may silently fail (https://github.com/ad-freiburg/qlever/issues/2806)
              # but still move the old index to previous.*. Check and revert if needed.
              if [ ! -f dataset-register.meta-data.json ]; then
                echo "ERROR: index missing after rebuild at $(date), restoring from previous..."
                latest_prev=$(ls -dt previous.* 2>/dev/null | head -1)
                if [ -n "$latest_prev" ]; then
                  mv "$latest_prev"/dataset-register.* . 2>/dev/null || true
                  mv "$latest_prev"/Qleverfile . 2>/dev/null || true
                  echo "Restored index from $latest_prev at $(date)"
                else
                  echo "FATAL: no previous index to restore from at $(date)"
                fi
              else
                echo "Rebuild complete at $(date), restarting server..."
                qlever stop

                # Archive update-triples file with timestamp because QLever doesn’t remove it.
                for f in *.update-triples; do
                  if [ -f "$f" ]; then
                    mv "$f" "$f.$(date +%Y-%m-%dT%H:%M:%S)"
                  fi
                done

                start_server
              fi
            done
      - name: s3-sync
        image:
          repository: d3fk/s3cmd
          tag: latest
        flux:
          enabled: false
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: dataset-register-s3
                key: key
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-s3
                key: secret
        volumeMounts:
          - name: data
            mountPath: /data
            readOnly: true
        command:
          - sh
          - -c
          - |
            while true; do
              if [ -f /data/dataset-register.update-triples ]; then
                echo "$(date): Uploading update-triples to S3..."
                s3cmd --host=ams3.digitaloceanspaces.com \
                  --host-bucket="%(bucket)s.ams3.digitaloceanspaces.com" \
                  put /data/dataset-register.update-triples s3://dataset-register/
              fi
              sleep 3600
            done
    securityContext:
      fsGroup: 100

    volumes:
      - name: config
        configMap:
          name: dataset-register-qlever-qleverfile

    persistentVolumes:
      - name: data
        size: 50Gi

    ingresses:
      - hosts:
          - datasetregister.netwerkdigitaalerfgoed.nl
        paths:
          - path: /sparql
            pathType: Prefix
        tls:
          enabled: false

    configMaps:
      - name: qleverfile
        data:
          Qleverfile: |
            [data]
            NAME              = dataset-register
            GET_DATA_CMD      = curl -sS -O https://dataset-register.ams3.digitaloceanspaces.com/data.nq
            TEXT_DESCRIPTION  = All literals, search with FILTER CONTAINS(?var, "...")
            DESCRIPTION       = NDE Dataset Register
            FORMAT            = nq

            [index]
            INPUT_FILES     = data.nq
            CAT_INPUT_FILES = cat ${INPUT_FILES}
            SETTINGS_JSON   = { "ascii-prefixes-only": true, "num-triples-per-batch": 100000 }
            TEXT_INDEX      = none

            [server]
            PORT               = 7001
            MEMORY_FOR_QUERIES = 8G
            CACHE_MAX_SIZE     = 2G
            TIMEOUT            = 30s
            PERSIST_UPDATES    = true

            [runtime]
            SYSTEM = native

            [ui]
            UI_CONFIG = dataset-register
