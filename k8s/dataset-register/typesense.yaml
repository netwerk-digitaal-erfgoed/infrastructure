apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-register-typesense
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      type: statefulset

    service:
      port: 8108

    containers:
      - name: app
        image:
          # v30 is required: earlier versions lack Dutch stemming and the
          # Synonym Sets API the search index relies on. Flux auto-updates within
          # v30 only (see flux.policy); moving to v31 is a deliberate manual bump.
          repository: typesense/typesense
          tag: "30.2" # {"$imagepolicy": "nde:dataset-register-typesense:tag"}
        flux:
          enabled: true
          policy:
            type: semver
            # Stable Typesense tags are 2-part (30.0, 30.1, 30.2, …). The pattern
            # keeps only those – excluding the -arm64/-amd64 arch variants and the
            # 31.0.rcN prereleases – and the range pins us to v30 so a v31 release
            # is never auto-selected.
            pattern: '^(?P<version>\d+\.\d+)$'
            extract: '$version'
            range: ">=30.0.0 <31.0.0"
        port: 8108
        env:
          - name: TYPESENSE_DATA_DIR
            value: "/data"
          - name: TYPESENSE_API_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-typesense
                key: api-key
        resources:
          requests:
            cpu: "250m"
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8108
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8108
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
          - name: data
            mountPath: /data

    persistentVolumes:
      - name: data
        size: 10Gi

    # Typesense is reached only in-cluster by the browser pod's server-side
    # search engine (via the `dataset-register-typesense` service on 8108), so it
    # has no ingress. The former public `search.datasetregister…` subdomain and
    # its search-only key served the retired client-direct search path.
