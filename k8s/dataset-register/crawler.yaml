apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-register-crawler
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    containers:
      - name: app
        image:
          repository: ghcr.io/netwerk-digitaal-erfgoed/dataset-register/apps-crawler
          tag: 20260702105801-7c1358f # {"$imagepolicy": "nde:dataset-register-crawler:tag"}
        port: 3000
        env:
          - name: SPARQL_URL
            value: "http://dataset-register-qlever"
          - name: SPARQL_ACCESS_TOKEN
            valueFrom:
              secretKeyRef:
                name: dataset-register-qlever
                key: access-token
          - name: CRAWLER_SCHEDULE
            value: "0 * * * *"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://nde-otel.monitoring.svc.cluster.local:4318"
          - name: TYPESENSE_HOST
            value: "dataset-register-typesense"
          - name: TYPESENSE_PORT
            value: "8108"
          - name: TYPESENSE_PROTOCOL
            value: "http"
          - name: TYPESENSE_API_KEY
            valueFrom:
              secretKeyRef:
                name: dataset-register-typesense
                key: api-key
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi
          limits:
            cpu: "1"
            memory: 4Gi
