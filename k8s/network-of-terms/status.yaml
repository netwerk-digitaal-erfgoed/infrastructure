apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: network-of-terms-status
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      replicas: 1
    containers:
      - name: app
        image:
          repository: ghcr.io/netwerk-digitaal-erfgoed/network-of-terms-status
          tag: 20260706110003-ce27832 # {"$imagepolicy": "nde:network-of-terms-status:tag"}
        port: 3000
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: status-postgres
                key: database-url
          - name: GTAA_CREDENTIALS
            valueFrom:
              secretKeyRef:
                name: network-of-terms-gtaa-credentials
                key: credentials
          - name: LDES_BASE_URL
            value: https://status.termennetwerk.netwerkdigitaalerfgoed.nl
          # Serve the observations already persisted in Postgres immediately on
          # restart; the periodic cron refreshes them within POLLING_INTERVAL_SECONDS.
          # Keeps the initial check and its materialized-view refresh off the
          # startup critical path (they blocked the server from listening before).
          - name: RUN_ON_START
            value: 'false'
    ingresses:
      - hosts:
          - status.termennetwerk.netwerkdigitaalerfgoed.nl
