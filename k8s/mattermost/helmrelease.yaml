apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
  namespace: nde
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    containers:
      - name: app
        image:
          repository: mattermost/mattermost-team-edition
          tag: "11.8.3" # {"$imagepolicy": "nde:mattermost:tag"}
        port: 8065
        flux:
          policy:
            type: semver
            range: "~11"
        env:
          - name: MM_SERVICESETTINGS_SITEURL
            value: https://chat.netwerkdigitaalerfgoed.nl
          # Store configuration in Postgres so System Console changes survive
          # pod restarts (config.json is not on a persistent volume). Env vars
          # still override the database store, 12-factor style.
          - name: MM_CONFIG
            valueFrom:
              secretKeyRef:
                name: mattermost-postgres
                key: datasource
          - name: MM_SERVICESETTINGS_ENABLEEMAILINVITATIONS
            value: "true"
          - name: MM_SQLSETTINGS_DRIVERNAME
            value: postgres
          - name: MM_SQLSETTINGS_DATASOURCE
            valueFrom:
              secretKeyRef:
                name: mattermost-postgres
                key: datasource
          - name: MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS
            value: "true"
          - name: MM_EMAILSETTINGS_ENABLESMTPAUTH
            value: "true"
          - name: MM_EMAILSETTINGS_SMTPSERVER
            value: smtp.lettermint.co
          - name: MM_EMAILSETTINGS_SMTPPORT
            value: "587"
          - name: MM_EMAILSETTINGS_SMTPUSERNAME
            value: lettermint
          - name: MM_EMAILSETTINGS_SMTPPASSWORD
            valueFrom:
              secretKeyRef:
                name: mattermost-smtp
                key: password
          - name: MM_EMAILSETTINGS_CONNECTIONSECURITY
            value: STARTTLS
          - name: MM_EMAILSETTINGS_FEEDBACKEMAIL
            value: noreply@netwerkdigitaalerfgoed.nl
          - name: MM_EMAILSETTINGS_FEEDBACKNAME
            value: Mattermost
          # Mobile pushes are relayed through Mattermost’s US-hosted TPNS proxy
          # (required for the official store apps), so strip the payload down
          # to the sender name only; message contents stay on our server.
          - name: MM_EMAILSETTINGS_SENDPUSHNOTIFICATIONS
            value: "true"
          - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONSERVER
            value: https://push-test.mattermost.com
          - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONCONTENTS
            value: generic_no_channel
          - name: MM_FILESETTINGS_DRIVERNAME
            value: amazons3
          - name: MM_FILESETTINGS_AMAZONS3ENDPOINT
            value: objectstore.surf.nl
          - name: MM_FILESETTINGS_AMAZONS3BUCKET
            value: mattermost
          - name: MM_FILESETTINGS_AMAZONS3REGION
            value: default
          - name: MM_FILESETTINGS_AMAZONS3ACCESSKEYID
            valueFrom:
              secretKeyRef:
                name: s3
                key: key
          - name: MM_FILESETTINGS_AMAZONS3SECRETACCESSKEY
            valueFrom:
              secretKeyRef:
                name: s3
                key: secret
    ingresses:
      - hosts:
          - chat.netwerkdigitaalerfgoed.nl
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: "100m"
