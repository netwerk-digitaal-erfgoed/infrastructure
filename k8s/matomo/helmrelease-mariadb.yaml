apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matomo-mariadb
  namespace: nde
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      type: statefulset
    containers:
      - name: mariadb
        image:
          repository: mariadb
          tag: "11.4.12" # {"$imagepolicy": "nde:matomo-mariadb-mariadb:tag"}
        port: 3306
        flux:
          policy:
            type: semver
            range: "~11.4"
        env:
          - name: MARIADB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: matomo-mariadb
                key: mariadb-root-password
          - name: MARIADB_USER
            valueFrom:
              secretKeyRef:
                name: matomo-mariadb
                key: mariadb-user
          - name: MARIADB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: matomo-mariadb
                key: mariadb-password
          - name: MARIADB_DATABASE
            value: matomo
        # The SURF LimitRange default (256M) is below InnoDB’s buffer pool plus
        # per-connection overhead, which OOM-killed MariaDB (crash recovery in the logs).
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: data
            mountPath: /var/lib/mysql
          - name: mariadb-config
            mountPath: /etc/mysql/conf.d/zzz-matomo.cnf
            subPath: zzz-matomo.cnf
    volumes:
      - name: mariadb-config
        configMap:
          name: matomo-mariadb-config
    configMaps:
      - name: config
        data:
          zzz-matomo.cnf: |
            [mariadbd]
            # Raised from the 128M default to cache more of the Matomo working set.
            innodb_buffer_pool_size = 256M
    persistentVolumes:
      - name: data
        size: 8Gi
    service:
      port: 3306
      targetPort: 3306
