apiVersion: batch/v1
kind: Job
metadata:
  name: geonames-sparql-reindex-10
  namespace: nde
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    reconcile.fluxcd.io/requestedAt: "2026-06-02T18:34:58Z"
spec:
  # One attempt: on failure the init scripts hold the pod alive (sleep) so its logs
  # stay readable in the Dashboard — so we don't want the Job to retry/recreate.
  backoffLimit: 0
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - geonames-sparql
              topologyKey: kubernetes.io/hostname
      serviceAccountName: statefulset-manager
      initContainers:
        # 1) Build the TDB2 store with tdb2.xloader. The jena-tools image carries the
        #    Jena CLI tools on a GNU-coreutils base (xloader needs bash + GNU sort).
        #    Pinned to the SAME Jena version as the Fuseki server via the shared
        #    geonames-sparql-fuseki ImagePolicy (jena-tools and fuseki publish identical
        #    tags), so loader and server never drift.
        - name: prepare-tdb
          image: netwerkdigitaalerfgoed/jena-tools:6.1.0 # {"$imagepolicy": "nde:geonames-sparql-fuseki:tag"}
          resources:
            requests:
              cpu: "1"
              # xloader is memory-frugal (external sort, modest heap), so a 2Gi request
              # is plenty for scheduling; the 8Gi limit covers the peak. Lower request =
              # less pressure on the near-full nde namespace memory quota.
              memory: 2Gi
            limits:
              cpu: "3"
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: staging
            - name: scratch
              mountPath: /scratch
          env:
            # xloader uses external sort (which wants OS memory + page cache), not a
            # large JVM heap, so keep the heap modest and leave room for sort(1).
            - name: JVM_ARGS
              value: "-Xmx2G"
          command:
            - sh
            - -c
            - |
              # On any failure, keep the pod alive (sleep) so its logs stay readable in
              # the Dashboard: we have no kubectl exec, and failed pods are GC'd quickly,
              # which has lost us three xloader failures already. Prune the Job via GitOps
              # once inspected (or it self-exits after the sleep).
              fail() { echo "### prepare-tdb FAILED at: $1 (rc=$?) — holding pod 2h for log inspection ###"; sleep 7200; exit 1; }
              rm -rf /data/* || fail "rm staging"
              # Do all bulk work (download, unzipped RDF, xloader temp files) on the
              # node-local scratch emptyDir, so the 50Gi data PVC only has to hold the
              # live production index plus the freshly built staging index.
              cd /scratch || fail "cd scratch"
              curl -sS -O https://geonames.ams3.digitaloceanspaces.com/geonames.zip || fail "download"
              unzip geonames.zip || fail "unzip"
              mkdir -p /scratch/tmp
              # tdb2.xloader’s sort calls hard-code GNU sort --buffer-size=50% – of the
              # HOST’s RAM, not the cgroup limit. The percentage is emitted by the Java
              # node-table and index builders, with no config knob. GNU sort uses the
              # LARGEST buffer size given, so appending -S does NOT override it; the
              # --buffer-size argument must be stripped. Shadow /usr/bin/sort with a
              # wrapper that removes any --buffer-size and forces -S 1G, so sort spills to
              # --tmpdir on disk and stays within the cgroup memory limit. Validated on the
              # amd64 image under a hard docker --memory cap (appending -S was a no-op:
              # GNU sort kept the larger 50% buffer and OOM-killed the pod on big nodes).
              cp /usr/bin/sort /usr/bin/sort.real || fail "cp sort"
              printf '%s\n' '#!/bin/sh' 'set -f' 'n=""' 'for a in "$@"; do' '  case "$a" in --buffer-size=*) ;; *) n="$n $a" ;; esac' 'done' 'exec /usr/bin/sort.real $n -S 1G' > /usr/bin/sort || fail "shadow sort"
              chmod +x /usr/bin/sort || fail "chmod sort"
              # The published geonames.zip may contain N-Triples (geonames.nt) or, for older
              # builds, Turtle (geonames.ttl). Load whichever is present; tdb2.xloader infers
              # the RDF syntax from the file extension.
              RDF_FILE=$(ls geonames.nt geonames.ttl 2>/dev/null | head -n1)
              [ -n "$RDF_FILE" ] || fail "no geonames.nt or geonames.ttl in zip"
              tdb2.xloader --loc /data/tdb --tmpdir /scratch/tmp "/scratch/$RDF_FILE" || fail "xloader"
              # Make the TDB2 store group-writable so the Fuseki server (group 100 via
              # fsGroup) can open it read-write after the swap. Done here because xloader
              # writes the files as root (this image's default user).
              chmod -R g+w /data || fail "chmod"
        # 2) Build the Lucene text index. jena.textindexer ships only in the Fuseki
        #    server jar (jena-text is not in the apache-jena CLI distribution), so run it
        #    from the Fuseki image — Apache's documented method
        #    (java -cp fuseki-server.jar jena.textindexer). Runs as the image's default
        #    user (UID 1000) — the same UID as the server — so the index it writes is
        #    already server-owned; no root needed.
        - name: build-text-index
          image: netwerkdigitaalerfgoed/fuseki:6.1.0 # {"$imagepolicy": "nde:geonames-sparql-fuseki:tag"}
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "3"
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: staging
            - name: fuseki-config
              mountPath: /fuseki-config
          command:
            - sh
            - -c
            - |
              # On failure, hold the pod alive so logs stay readable (see prepare-tdb).
              fail() { echo "### build-text-index FAILED at: $1 (rc=$?) — holding pod 2h for log inspection ###"; sleep 7200; exit 1; }
              echo "Creating Lucene index..."
              jar=$(ls /fuseki/jena-fuseki-server-*.jar) || fail "find fuseki jar"
              "$JAVA_HOME/bin/java" -Xmx6g -cp "$jar" jena.textindexer --desc=/fuseki-config/config.ttl || fail "textindexer"
              # Make the text index group-writable so the restart-server container (group
              # 100 via fsGroup, but a different UID) can move it staging→production.
              # Renaming a directory needs write on the directory itself; this container
              # creates /data/index as UID 1000 mode 755, so without this the swap fails
              # with "mv: Permission denied" (which is exactly what bit reindex-10).
              chmod -R g+w /data/index || fail "chmod index"
      containers:
        - name: restart-server
          image: bitnami/kubectl:latest
          volumeMounts:
            - name: data
              mountPath: /data
          command:
            - sh
            - -c
            - |
              kubectl scale statefulset/geonames-sparql --replicas=0
              kubectl rollout status statefulset/geonames-sparql --watch
              rm -rf /data/production/*
              mv /data/staging/* /data/production
              kubectl scale statefulset/geonames-sparql --replicas=1
      restartPolicy: OnFailure
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-geonames-sparql-0
        - name: fuseki-config
          configMap:
            name: geonames-sparql-fuseki-config
        # Node-local scratch for download + unzipped RDF + xloader sort files.
        # sizeLimit bounds it so an overflow evicts only this pod, not the node.
        - name: scratch
          emptyDir:
            sizeLimit: 40Gi
      securityContext:
        fsGroup: 100