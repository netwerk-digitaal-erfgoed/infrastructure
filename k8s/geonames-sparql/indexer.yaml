apiVersion: batch/v1
kind: CronJob
metadata:
  name: geonames-sparql-indexer
  namespace: nde
spec:
  # Staggered to 04:00 so it does not collide with the dataset-knowledge-graph
  # CronJob (02:00) on the shared, near-full node. Two 12Gi-class jobs running at
  # once caused node memory pressure that got the reindex pod killed; the 2h gap
  # lets dkg finish (and release its memory) before the reindex starts.
  schedule: "0 4 * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - geonames-sparql
                  topologyKey: kubernetes.io/hostname
          serviceAccountName: statefulset-manager
          initContainers:
            # 1) Build the TDB2 store with tdb2.xloader. The jena-tools image carries the
            #    Jena CLI tools on a GNU-coreutils base (xloader needs bash + GNU sort).
            #    Pinned to the SAME Jena version as the Fuseki server via the shared
            #    geonames-sparql-fuseki ImagePolicy (jena-tools and fuseki publish identical
            #    tags), so loader and server never drift.
            - name: prepare-tdb
              image: netwerkdigitaalerfgoed/jena-tools:6.1.0 # {"$imagepolicy": "nde:geonames-sparql-fuseki:tag"}
              resources:
                requests:
                  cpu: "1"
                  # xloader is memory-frugal (external sort, modest heap), so a 2Gi
                  # request is plenty for scheduling; the 8Gi limit covers the peak.
                  # Lower request = less pressure on the nde namespace memory quota,
                  # which matters because this runs at 02:00 alongside the dkg job.
                  memory: 2Gi
                limits:
                  cpu: "3"
                  memory: 8Gi
              volumeMounts:
                - name: data
                  mountPath: /data
                  subPath: staging
                - name: scratch
                  mountPath: /scratch
              env:
                # xloader uses external sort (which wants OS memory + page cache), not a
                # large JVM heap, so keep the heap modest and leave room for sort(1).
                - name: JVM_ARGS
                  value: "-Xmx2G"
              command:
                - sh
                - -c
                - |
                  set -e
                  rm -rf /data/*
                  # Do all bulk work (download, unzipped RDF, xloader temp files) on the
                  # node-local scratch emptyDir, so the 50Gi data PVC only has to hold the
                  # live production index plus the freshly built staging index.
                  cd /scratch
                  curl -sS -O https://geonames.ams3.digitaloceanspaces.com/geonames.zip
                  unzip geonames.zip
                  mkdir -p /scratch/tmp
                  # tdb2.xloader’s sort calls hard-code GNU sort --buffer-size=50% – of the
                  # HOST’s RAM, not the cgroup limit. The percentage is emitted by the Java
                  # node-table and index builders, with no config knob. GNU sort uses the
                  # LARGEST buffer size given, so appending -S does NOT override it; the
                  # --buffer-size argument must be stripped. Shadow /usr/bin/sort with a
                  # wrapper that removes any --buffer-size and forces -S 1G, so sort spills
                  # to --tmpdir on disk and stays within the cgroup memory limit. Validated
                  # on the amd64 image under a hard docker --memory cap (appending -S was a
                  # no-op: GNU sort kept the larger 50% buffer and OOM-killed the pod).
                  cp /usr/bin/sort /usr/bin/sort.real
                  printf '%s\n' '#!/bin/sh' 'set -f' 'n=""' 'for a in "$@"; do' '  case "$a" in --buffer-size=*) ;; *) n="$n $a" ;; esac' 'done' 'exec /usr/bin/sort.real $n -S 1G' > /usr/bin/sort
                  chmod +x /usr/bin/sort
                  # The published geonames.zip may contain N-Triples (geonames.nt) or, for
                  # older builds, Turtle (geonames.ttl). Load whichever is present; tdb2.xloader
                  # infers the RDF syntax from the file extension.
                  RDF_FILE=$(ls geonames.nt geonames.ttl 2>/dev/null | head -n1)
                  [ -n "$RDF_FILE" ] || { echo "No geonames.nt or geonames.ttl found in zip"; exit 1; }
                  tdb2.xloader --loc /data/tdb --tmpdir /scratch/tmp "/scratch/$RDF_FILE"
                  # Make the TDB2 store group-writable so the Fuseki server (group 100 via
                  # fsGroup) can open it read-write after the swap. Done here because xloader
                  # writes the files as root (this image's default user).
                  chmod -R g+w /data
            # 2) Build the Lucene text index. jena.textindexer ships only in the Fuseki
            #    server jar (jena-text is not in the apache-jena CLI distribution), so run
            #    it from the Fuseki image — Apache's documented method
            #    (java -cp fuseki-server.jar jena.textindexer). Runs as the image's default
            #    user (UID 1000) — the same UID as the server — so the index it writes is
            #    already server-owned; no root needed.
            - name: build-text-index
              image: netwerkdigitaalerfgoed/fuseki:6.1.0 # {"$imagepolicy": "nde:geonames-sparql-fuseki:tag"}
              resources:
                requests:
                  cpu: "1"
                  memory: 2Gi
                limits:
                  cpu: "3"
                  memory: 8Gi
              volumeMounts:
                - name: data
                  mountPath: /data
                  subPath: staging
                - name: fuseki-config
                  mountPath: /fuseki-config
              command:
                - sh
                - -c
                - |
                  set -e
                  echo "Creating Lucene index..."
                  jar=$(ls /fuseki/jena-fuseki-server-*.jar)
                  "$JAVA_HOME/bin/java" -Xmx6g -cp "$jar" jena.textindexer --desc=/fuseki-config/config.ttl
                  # Make the text index group-writable so the restart-server container
                  # (group 100 via fsGroup, but a different UID) can move it staging→
                  # production. Renaming a directory needs write on the directory itself;
                  # this container creates /data/index as UID 1000 mode 755, so without
                  # this the swap fails with "mv: Permission denied".
                  chmod -R g+w /data/index
          containers:
            - name: restart-server
              image: bitnami/kubectl:latest
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 384Mi
              volumeMounts:
                - name: data
                  mountPath: /data
              command:
                - sh
                - -c
                - |
                  kubectl scale statefulset/geonames-sparql --replicas=0
                  kubectl rollout status statefulset/geonames-sparql --watch
                  rm -rf /data/production/*
                  mv /data/staging/* /data/production
                  kubectl scale statefulset/geonames-sparql --replicas=1
          restartPolicy: OnFailure
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: data-geonames-sparql-0
            - name: fuseki-config
              configMap:
                name: geonames-sparql-fuseki-config
            # Node-local scratch for download + unzipped RDF + xloader sort files.
            # sizeLimit bounds it so an overflow evicts only this pod, not the node.
            - name: scratch
              emptyDir:
                sizeLimit: 40Gi
          securityContext:
            fsGroup: 100
