# One-off manual run of the dataset-knowledge-graph CronJob for debugging.
# Mirrors the jobTemplate rendered by helm/nde-app from helmrelease.yaml.
# Rename (bump the suffix) when triggering another manual run, since Jobs are immutable.
apiVersion: batch/v1
kind: Job
metadata:
  name: dataset-knowledge-graph-manual-2026-05-29-b
  namespace: nde
  labels:
    app.kubernetes.io/name: dataset-knowledge-graph
    app: dataset-knowledge-graph
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dataset-knowledge-graph
        app: dataset-knowledge-graph-app
    spec:
      imagePullSecrets:
        - name: ghcr
      securityContext:
        fsGroup: 100
      containers:
        - name: app
          image: ghcr.io/netwerk-digitaal-erfgoed/dataset-knowledge-graph
          imagePullPolicy: Always
          env:
            - name: QLEVER_ENV
              value: native
            - name: QLEVER_PORT
              value: "7100"
            - name: SPARQL_UPDATE_URL
              value: http://graphdb/repositories/dataset-knowledge-graph/statements
            - name: SPARQL_UPDATE_AUTHORIZATION
              valueFrom:
                secretKeyRef:
                  key: authorization
                  name: graphdb
            - name: GRAPHDB_URL
              value: http://graphdb
            - name: GRAPHDB_USERNAME
              valueFrom:
                secretKeyRef:
                  key: username
                  name: graphdb
            - name: GRAPHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: graphdb
          volumeMounts:
            - mountPath: /app/imports
              name: imports
          resources:
            limits:
              cpu: "3"
              memory: 16Gi
            requests:
              cpu: "2"
              memory: 12Gi
      volumes:
        - name: imports
          persistentVolumeClaim:
            claimName: dataset-knowledge-graph-imports
      restartPolicy: OnFailure
