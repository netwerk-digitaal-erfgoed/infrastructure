# One-off manual run of the dataset-knowledge-graph CronJob for debugging.
# Mirrors the jobTemplate rendered by helm/nde-app from helmrelease.yaml.
# Rename (bump the suffix) when triggering another manual run, since Jobs are immutable.
apiVersion: batch/v1
kind: Job
metadata:
  name: dataset-knowledge-graph-manual-2026-06-04-c
  namespace: nde
  labels:
    app.kubernetes.io/name: dataset-knowledge-graph
    app: dataset-knowledge-graph
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dataset-knowledge-graph
        app: dataset-knowledge-graph-app
    spec:
      imagePullSecrets:
        - name: ghcr
      securityContext:
        fsGroup: 100
      containers:
        - name: app
          image: ghcr.io/netwerk-digitaal-erfgoed/dataset-knowledge-graph
          imagePullPolicy: Always
          env:
            - name: QLEVER_ENV
              value: native
            - name: QLEVER_PORT
              value: "7100"
            # Experiment (option D): cap QLever well below the 16Gi container
            # limit so over-budget queries on huge datasets abort gracefully
            # (HTTP 500, caught per stage) instead of OOM-killing the pod.
            - name: QLEVER_MEMORY_MAX_SIZE
              value: 8G
            - name: OUTPUT_CACHE_DIR
              value: /data/nq
            - name: OUTPUT_VALIDATION_CACHE_DIR
              value: /data/validation/nq
            - name: REBUILD_SENTINEL_PATH
              value: /data/nq/.rebuild
          volumeMounts:
            - mountPath: /app/imports
              name: imports
            - mountPath: /data
              name: nq
          resources:
            limits:
              cpu: "3"
              memory: 16Gi
            requests:
              cpu: "2"
              memory: 12Gi
      # Restrict to the 8-core/32GB node pool, then co-locate with the serving
      # QLever pod so both can mount the ReadWriteOnce `nq` volume.
      nodeSelector:
        surf.nl/nodesize: 8core32gb
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: dataset-knowledge-graph-qlever
              topologyKey: kubernetes.io/hostname
      volumes:
        - name: imports
          persistentVolumeClaim:
            claimName: dataset-knowledge-graph-imports
        - name: nq
          persistentVolumeClaim:
            claimName: dataset-knowledge-graph-qlever-nq
      restartPolicy: OnFailure
