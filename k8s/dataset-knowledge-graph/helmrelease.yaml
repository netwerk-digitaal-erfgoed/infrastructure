apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-knowledge-graph
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    pvcs:
      - name: imports
        size: 500Gi
    cronjobs:
      - name: app
        schedule: "0 2 * * *"
        timeZone: Europe/Amsterdam
        concurrencyPolicy: Forbid
        backoffLimit: 1
        image: ghcr.io/netwerk-digitaal-erfgoed/dataset-knowledge-graph
        imagePullPolicy: Always
        env:
          - name: QLEVER_ENV
            value: native
          - name: QLEVER_PORT
            value: "7100"
          # Cap QLever well below the 16Gi container limit so over-budget queries
          # on huge datasets abort gracefully (HTTP 500, caught per stage) instead
          # of OOM-killing the pod. Validated: at 8G a 219.9M-triple linkset that
          # killed the run at 12G instead degrades, and the run completes.
          - name: QLEVER_MEMORY_MAX_SIZE
            value: "8G"
          - name: SPARQL_UPDATE_URL
            value: "http://graphdb/repositories/dataset-knowledge-graph/statements"
          - name: SPARQL_UPDATE_AUTHORIZATION
            valueFrom:
              secretKeyRef:
                name: graphdb
                key: authorization
          - name: GRAPHDB_URL
            value: "http://graphdb"
          - name: GRAPHDB_USERNAME
            valueFrom:
              secretKeyRef:
                name: graphdb
                key: username
          - name: GRAPHDB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: graphdb
                key: password
        volumeMounts:
          - mountPath: /app/imports
            name: imports
        volumes:
          - name: imports
            persistentVolumeClaim:
              claimName: dataset-knowledge-graph-imports
        resources:
          requests:
            cpu: "2"
            memory: 12Gi
          limits:
            cpu: "3"
            memory: 16Gi
        securityContext:
          fsGroup: 100
