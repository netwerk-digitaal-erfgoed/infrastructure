apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-knowledge-graph
spec:
  serviceAccountName: nde
  interval: 30m
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    pvcs:
      - name: imports
        size: 500Gi
    cronjobs:
      - name: app
        schedule: "0 2 * * *"
        timeZone: Europe/Amsterdam
        # Replace, not Forbid: if a previous run is still going when the next
        # one is due, terminate it and start fresh rather than skipping the new
        # run. The KG is rebuilt from scratch each run, so the latest run always
        # wins; this also avoids two pipelines racing on the shared RWO volume.
        concurrencyPolicy: Replace
        backoffLimit: 1
        image: ghcr.io/netwerk-digitaal-erfgoed/dataset-knowledge-graph
        imagePullPolicy: Always
        env:
          - name: QLEVER_ENV
            value: native
          - name: QLEVER_PORT
            value: "7100"
          # QLever query-memory budget, kept WELL BELOW the container memory limit
          # so an over-budget query on a huge dataset aborts gracefully (HTTP 500,
          # caught per stage) instead of OOM-killing the pod and aborting the whole
          # run. Raised 8G -> 12G together with the container limit 16Gi -> 22Gi so
          # the graceful-degradation gap is preserved (~10Gi), letting heavier
          # per-dataset analysis queries on large dumps complete. History: 12G
          # under the old 16Gi limit OOM-killed the run; 12G under 22Gi does not.
          # See netwerk-digitaal-erfgoed/dataset-knowledge-graph#340.
          - name: QLEVER_MEMORY_MAX_SIZE
            value: "12G"
          # Output store: write one n-quads file per dataset onto the shared
          # volume, then signal the read-only serving QLever (qlever.yaml) to
          # rebuild. No GraphDB; the KG is rebuilt from these files each run.
          - name: OUTPUT_CACHE_DIR
            value: /data/nq
          - name: OUTPUT_VALIDATION_CACHE_DIR
            value: /data/validation/nq
          # Per-dataset processing records (provenance) for skipping unchanged
          # datasets: written here for the serving QLever to index (see
          # qlever.yaml's Qleverfile), and read back from the served endpoint
          # below at the start of the next run.
          - name: OUTPUT_PROVENANCE_CACHE_DIR
            value: /data/provenance/nq
          # The served (read-only) QLever the skip gate queries for the previous
          # run's records. Setting this activates dataset skipping; unset, every
          # dataset is reprocessed.
          - name: SERVED_SPARQL_ENDPOINT
            value: https://sparql.netwerkdigitaalerfgoed.nl/dataset-knowledge-graph
          - name: REBUILD_SENTINEL_PATH
            value: /data/nq/.rebuild
        volumeMounts:
          - mountPath: /app/imports
            name: imports
          - mountPath: /data
            name: nq
        volumes:
          - name: imports
            persistentVolumeClaim:
              claimName: dataset-knowledge-graph-imports
          # The same ReadWriteOnce claim the serving QLever mounts. RWO allows
          # multiple pods only on one node, hence the podAffinity below.
          - name: nq
            persistentVolumeClaim:
              claimName: dataset-knowledge-graph-qlever-nq
        # Restrict to the 8-core/32GB node pool (enough RAM for this run plus the
        # co-located QLever), then pin onto the exact node where the serving
        # QLever pod lives so both can mount the ReadWriteOnce `nq` volume.
        nodeSelector:
          surf.nl/nodesize: 8core32gb
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app: dataset-knowledge-graph-qlever
                topologyKey: kubernetes.io/hostname
        resources:
          requests:
            cpu: "2"
            memory: 12Gi
          # The analysis qlever-index import is the slow phase and is parallel,
          # CPU-bound: it uses ~6 cores at peak (p95 5.9) but was throttled at 3.
          # See netwerk-digitaal-erfgoed/dataset-knowledge-graph#337.
          limits:
            cpu: "6"
            # 22Gi (raised from 16Gi) draws on the 8-core/32GiB node's real free
            # RAM (~17GiB actually free; node memory requests are ~95% committed,
            # so we raise the LIMIT, not the request). Keeps a ~10Gi gap above
            # QLEVER_MEMORY_MAX_SIZE=12G so over-budget queries fail gracefully
            # (HTTP 500 per stage) rather than OOM-killing the pod. See #340.
            memory: 22Gi
        securityContext:
          fsGroup: 100
