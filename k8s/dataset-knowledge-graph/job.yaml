apiVersion: batch/v1
kind: Job
metadata:
  name: dataset-knowledge-graph-app-manual
  namespace: nde
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: nde
      restartPolicy: Never
      securityContext:
        fsGroup: 100
      containers:
        - name: app
          image: ghcr.io/netwerk-digitaal-erfgoed/dataset-knowledge-graph
          imagePullPolicy: Always
          env:
            - name: QLEVER_ENV
              value: native
            - name: QLEVER_PORT
              value: "7100"
            - name: SPARQL_UPDATE_URL
              value: "http://graphdb/repositories/dataset-knowledge-graph/statements"
            - name: SPARQL_UPDATE_AUTHORIZATION
              valueFrom:
                secretKeyRef:
                  name: graphdb
                  key: authorization
            - name: GRAPHDB_URL
              value: "http://graphdb"
            - name: GRAPHDB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: graphdb
                  key: username
            - name: GRAPHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graphdb
                  key: password
          volumeMounts:
            - mountPath: /app/imports
              name: imports
          resources:
            requests:
              cpu: "2"
              memory: 12Gi
            limits:
              cpu: "3"
              memory: 16Gi
      volumes:
        - name: imports
          persistentVolumeClaim:
            claimName: dataset-knowledge-graph-imports
