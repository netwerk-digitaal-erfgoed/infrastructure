# Read-only QLever that serves the Dataset Knowledge Graph.
#
# This replaces GraphDB as the DKG output store (see issue #298). The pipeline
# CronJob (helmrelease.yaml) writes one n-quads file per analysed dataset onto a
# shared volume; this long-running pod serves SPARQL from an index built over
# those files and rebuilds whenever the pipeline drops a `.rebuild` marker — on a
# successful AND a partially-failed run alike, so operators always see the set
# that was processed.
#
# Read-only on purpose: NO SPARQL UPDATE, no PERSIST_UPDATES, no access token.
# The KG is a pure derived/cache, rebuilt from the files; QLever's UPDATE path is
# too flaky to depend on.
#
# Co-location: the shared volume is ReadWriteOnce, so the CronJob pins itself to
# this pod's node via podAffinity (helmrelease.yaml). This pod is therefore the
# scheduling anchor; keep its labels stable.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dataset-knowledge-graph-qlever
spec:
  serviceAccountName: nde
  interval: 30m
  # This pod builds its index on start, so it is not Ready immediately. Don't let
  # Helm block on readiness during install/upgrade — otherwise the 5m wait times
  # out (worsened by the cluster's client rate limiter), the release is marked
  # failed, and the new spec never sticks. K8s readiness still gates traffic.
  install:
    disableWait: true
  upgrade:
    disableWait: true
    remediation:
      remediateLastFailure: false
  chart:
    spec:
      chart: helm/nde-app
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: nde
  values:
    workload:
      type: statefulset

    containers:
      - name: app
        image:
          repository: adfreiburg/qlever
          tag: commit-4d113e0
        flux:
          enabled: false
        port: 7001
        env:
          # Local time for the daily fallback rebuild (see the loop below).
          - name: TZ
            value: Europe/Amsterdam
        resources:
          # QLever is memory-mapped: the cgroup memory LIMIT bounds working set +
          # mmap'd index page cache. The DKG summaries are far smaller than the
          # source data they describe, so this index is modest; keep headroom for
          # the page cache but a low request to be a good tenant.
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 8Gi
        startupProbe:
          httpGet:
            path: /?query=ASK%20%7B%7D
            port: 7001
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 60 # Allow time for the initial index build.
        livenessProbe:
          httpGet:
            path: /?query=ASK%20%7B%7D
            port: 7001
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
          - name: data
            mountPath: /data
          - name: config
            mountPath: /config/Qleverfile
            subPath: Qleverfile
        workingDir: /data
        command:
          - sh
          - -c
          - |
            # Terminate qlever-server cleanly when the kubelet sends SIGTERM.
            trap 'echo "SIGTERM received, stopping qlever-server"; qlever stop 2>/dev/null || true; exit 0' TERM INT

            # Copy the Qleverfile out of the read-only /config mount into the
            # working dir: the qlever CLI expects it in the cwd, and `qlever index`
            # writes the index files (index.*) alongside it here.
            cp /config/Qleverfile Qleverfile

            # The pipeline writes here; make sure the directories exist so the
            # first boot (before any pipeline run) and the input glob both work.
            mkdir -p nq validation/nq provenance/nq

            start_server() {
              qlever start
              qlever log &
            }

            # QLever needs at least one input file to build an index; on a cold
            # cache (before the first pipeline run, or if everything was pruned)
            # there are none, so seed a single placeholder triple in a dedicated
            # graph. The server can then start and serve (empty of datasets)
            # instead of failing on a missing index. It is removed again as soon
            # as real n-quads exist, so it never appears in a populated index.
            BOOTSTRAP=nq/_bootstrap.nq
            seed_if_empty() {
              if find nq validation/nq provenance/nq -name '*.nq' ! -name '_bootstrap.nq' \
                   -print -quit 2>/dev/null | grep -q .; then
                rm -f "$BOOTSTRAP"
              else
                echo '<https://data.netwerkdigitaalerfgoed.nl/dkg/.well-known/bootstrap> <http://www.w3.org/1999/02/22-rdf-syntax-ns#type> <https://def.nde.nl/dkg#Bootstrap> <https://data.netwerkdigitaalerfgoed.nl/dkg/.well-known/bootstrap> .' > "$BOOTSTRAP"
              fi
            }

            # Build an initial index from whatever has been produced so far, so
            # the server always has something to serve (an empty graph until the
            # first pipeline run completes).
            if [ ! -f index.meta-data.json ]; then
              echo "No index yet, building initial index at $(date)"
              seed_if_empty
              qlever index || echo "Initial index build failed"
            fi

            start_server

            # Rebuild the served index from the current n-quads.
            #
            # FULL offline rebuild with `qlever index`, NOT `qlever rebuild-index`.
            # rebuild-index rebuilds only the triples the server already has loaded
            # (plus any persisted SPARQL updates); it does NOT re-read INPUT_FILES,
            # so it silently ignores the .nq files the pipeline wrote since the
            # server booted (verified on the prod image: it "rebuilds in 0 seconds"
            # and the newly added graphs never appear). Our KG is file-based, so the
            # refresh must re-read every file — which only the full `qlever index`
            # does. (rebuild-index is the right tool only for an UPDATE-driven store
            # like dataset-register, where new data arrives via SPARQL UPDATE.)
            #
            # The server must be stopped during the build (qlever memory-maps the
            # index in place). For resilience we first copy the current index aside,
            # keeping exactly one backup: if the rebuild fails we restore it, so the
            # server always comes back on the previous index rather than on nothing.
            rebuild() {
              echo "Rebuilding index at $(date)"
              seed_if_empty
              qlever stop 2>/dev/null || true

              rm -rf previous.*
              backup="previous.$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              mkdir -p "$backup"
              cp -a index.* "$backup"/ 2>/dev/null || true

              if qlever index --overwrite-existing && [ -f index.meta-data.json ]; then
                echo "Rebuild complete at $(date), restarting server..."
              else
                echo "ERROR: rebuild failed at $(date), restoring previous index..."
                rm -f index.* 2>/dev/null || true
                cp -a "$backup"/index.* . 2>/dev/null || true
              fi
              start_server
            }

            SENTINEL=/data/nq/.rebuild
            last_scheduled_day=""
            echo "Watching $SENTINEL; daily fallback rebuild at 01:00 $TZ"
            while true; do
              trigger=""

              # Event-driven: the pipeline drops this marker after every run
              # (success or partial failure) so fresh output is served promptly.
              if [ -f "$SENTINEL" ]; then
                trigger="sentinel"
              fi

              # Safety net: rebuild once a day at 01:00 even if a run was hard-
              # killed before it could drop the marker (a finally block does not
              # run on OOM/SIGKILL). Atomic per-dataset writes mean a rebuild that
              # races a running pipeline indexes only the completed files and skips
              # the in-flight *.tmp, so it never reads a half-written file.
              today=$(date +%Y-%m-%d)
              if [ "$(date +%H)" = "01" ] && [ "$today" != "$last_scheduled_day" ]; then
                trigger="schedule"
                last_scheduled_day="$today"
              fi

              if [ -n "$trigger" ]; then
                echo "Rebuild trigger: $trigger at $(date)"
                # Consume the marker first, so a run that finishes during the
                # rebuild re-triggers the next cycle instead of being missed.
                rm -f "$SENTINEL"
                rebuild
              fi
              sleep 30
            done
    securityContext:
      fsGroup: 100

    # Pin to the 8-core/32GB node pool so this pod and the co-located DKG run
    # (which follows it via podAffinity) both have enough RAM on one node.
    nodeSelector:
      surf.nl/nodesize: 8core32gb

    # Mount the shared ReadWriteOnce volume the pipeline writes its n-quads to.
    # It is a standalone PVC (created below via pvcs), not a volumeClaimTemplate,
    # so the CronJob can mount the very same claim.
    volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dataset-knowledge-graph-qlever-nq
      - name: config
        configMap:
          name: dataset-knowledge-graph-qlever-qleverfile

    pvcs:
      - name: nq
        size: 50Gi
        accessMode: ReadWriteOnce

    ingresses:
      # Shared SPARQL host (sparql.netwerkdigitaalerfgoed.nl), one path per QLever
      # instance. Public endpoint:
      #   https://sparql.netwerkdigitaalerfgoed.nl/dataset-knowledge-graph
      #
      # Split into TWO ingresses on the same host because `rewrite-target` is an
      # ingress-WIDE annotation, and cert-manager injects its HTTP-01
      # `/.well-known/acme-challenge/<token>` path into the cert-bearing ingress —
      # so a rewrite on that ingress mangles the ACME path and the cert never
      # issues. So:
      #
      #  1. Cert holder (first ingress, gets TLS + cert-manager.io/issuer): NO
      #     rewrite. cert-manager injects the ACME path here and it validates. Its
      #     own placeholder path never receives real traffic.
      #  2. Traffic (second ingress, no TLS so no ACME injection): the regex
      #     rewrite that maps the public prefix to QLever's /sparql. nginx merges
      #     both ingresses for the host and serves traffic over the cert from (1).
      - hosts:
          - sparql.netwerkdigitaalerfgoed.nl
        paths:
          # Placeholder: exists only so this ingress is valid and owns the host's
          # TLS cert; it does not overlap the traffic path below. Real requests go
          # to the rewrite ingress.
          - path: /dataset-knowledge-graph-tls-holder
            pathType: Prefix
      - name: rewrite
        hosts:
          - sparql.netwerkdigitaalerfgoed.nl
        annotations:
          nginx.ingress.kubernetes.io/rewrite-target: /sparql$2
        paths:
          - path: /dataset-knowledge-graph(/|$)(.*)
            pathType: ImplementationSpecific
        tls:
          enabled: false

    configMaps:
      - name: qleverfile
        data:
          Qleverfile: |
            [data]
            NAME             = index
            # Data is produced on the shared volume by the pipeline, so there is
            # nothing to fetch on (re)build.
            GET_DATA_CMD     = true
            DESCRIPTION      = NDE Dataset Knowledge Graph
            FORMAT           = nq

            [index]
            # CAT_INPUT_FILES is the actual data fed to the indexer: every .nq
            # across the three graph dirs — one named graph per analysed dataset
            # (summaries), the derived SHACL validation graphs, and the pipeline's
            # provenance graph (the per-dataset records the skip gate reads back).
            # `find` tolerates missing/empty dirs, so a cold or partial cache still
            # indexes.
            #
            # INPUT_FILES is only qlever-control's pre-flight existence check (run
            # BEFORE CAT_INPUT_FILES); if any of its globs matches zero files the
            # build aborts with "Did you call qlever get-data?". So it is a SINGLE
            # pattern over nq/, which the bootstrap seed keeps non-empty — listing
            # validation/ and provenance/ here too would abort whenever either is
            # empty (cold start, or a run with no validation reports yet), even
            # though CAT_INPUT_FILES handles them fine.
            INPUT_FILES      = nq/*.nq
            CAT_INPUT_FILES  = find nq validation/nq provenance/nq -name '*.nq' -exec cat {} +
            SETTINGS_JSON    = { "ascii-prefixes-only": false, "num-triples-per-batch": 100000 }
            TEXT_INDEX       = none

            [server]
            PORT               = 7001
            MEMORY_FOR_QUERIES = 6G
            CACHE_MAX_SIZE     = 2G
            TIMEOUT            = 120s
            # Read-only: no updates are ever applied to this store.
            PERSIST_UPDATES    = false

            [runtime]
            SYSTEM = native

            [ui]
            UI_CONFIG = dataset-knowledge-graph
