{{- with .Values.backup }}
{{- $secretName := (.s3).secretName | default "backup-s3" }}
{{- $defaultImage := printf "%s:%s" (index $.Values.containers 0).image.repository (index $.Values.containers 0).image.tag }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "nde-app.fullname" $ }}-backup
  labels:
    {{- include "nde-app.labels" $ | nindent 4 }}
spec:
  schedule: {{ .schedule | default "0 3 * * *" | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "nde-app.selectorLabels" $ | nindent 12 }}
            app: {{ include "nde-app.fullname" $ }}-backup
        spec:
          containers:
            - name: backup
              image: {{ .image | default $defaultImage }}
              command: ["/bin/sh"]
              args:
                - -c
                - |
                  set -eu
                  apk add --no-cache s3cmd
                  S3_HOST=$(echo "$S3_ENDPOINT" | sed 's|https\?://||')
                  FILENAME="{{ include "nde-app.fullname" $ }}/$(date +%Y-%m-%d_%H%M%S).gz"
                  {{ .command }} | gzip | \
                    s3cmd put --host="$S3_HOST" --host-bucket="$S3_BUCKET.$S3_HOST" \
                    --access_key="$S3_ACCESS_KEY" --secret_key="$S3_SECRET_KEY" \
                    - "s3://$S3_BUCKET/$FILENAME"
              env:
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: endpoint
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: bucket
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: access-key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ $secretName }}
                      key: secret-key
                {{- with .env }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- with .volumeMounts }}
              volumeMounts:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- with .volumes }}
          volumes:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure
{{- end }}
